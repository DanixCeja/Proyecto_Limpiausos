<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inspección de Calidad — LIMPIAUSOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="app">

    <!-- Barra superior -->
    <header class="topbar">
      <div class="topbar-left">
        <div class="logo-badge" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="#00e5a0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 12a10 10 0 1 0 20 0 10 10 0 0 0-20 0"/>
            <path d="M12 8v4l3 3"/>
          </svg>
        </div>
        <div>
          <span class="brand-name">LIMPIAUSOS</span>
          <span class="brand-sub">/ Inspección de calidad</span>
        </div>
      </div>
      <div class="status-pill" role="status">
        <div class="status-dot"></div>
        SISTEMA ACTIVO
      </div>
    </header>

    <!-- Panel principal -->
    <div class="main">

      <!-- Panel izquierdo: entrada -->
      <aside class="panel-left">

        <div>
          <div class="section-label">Imagen a inspeccionar</div>
          <div class="upload-zone" id="uploadZone" role="button" tabindex="0" aria-label="Zona de carga de imagen">
            <img id="preview" src="" alt="Vista previa de imagen cargada" />
            <div class="upload-placeholder" id="uploadPlaceholder">
              <div class="upload-icon" aria-hidden="true">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7a8299" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                  <polyline points="17 8 12 3 7 8"/>
                  <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
              </div>
              <p class="upload-text">Arrastra una imagen o haz clic para seleccionar</p>
              <p class="upload-subtext">PNG · JPG · WEBP &nbsp;·&nbsp; Máx 10 MB</p>
            </div>
          </div>
          <input type="file" id="imageInput" accept="image/*" aria-label="Seleccionar imagen" />
        </div>

        <div class="file-info" id="fileInfo" aria-live="polite">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="color:#4a5168;flex-shrink:0">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          <span class="file-name" id="fileName" style="color:#4a5168">Ningún archivo seleccionado</span>
        </div>

        <button class="analyze-btn" id="analyzeBtn" onclick="enviarImagen()" disabled aria-disabled="true">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          Analizar imagen
        </button>

      </aside>

      <!-- Panel derecho: resultados -->
      <section class="panel-right" id="panelRight" aria-live="polite">
        <div class="empty-state" id="emptyState">
          <div class="empty-grid" aria-hidden="true">
            <div class="empty-card"><div class="empty-bar" style="width:80%"></div></div>
            <div class="empty-card"><div class="empty-bar" style="width:60%"></div></div>
            <div class="empty-card" style="grid-column:1/-1;height:40px;"><div class="empty-bar" style="width:50%"></div></div>
          </div>
          <p class="empty-text">Carga una imagen para iniciar la inspección</p>
        </div>
      </section>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
